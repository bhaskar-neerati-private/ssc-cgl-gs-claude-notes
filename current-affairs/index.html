<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Affairs</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<header class="site-header">
  <a href="../index.html"><strong>SSC CGL GS Notes</strong></a>
  <nav>
    <a href="../static/index.html">Static GS</a>
    <a href="../current-affairs/index.html">Current Affairs</a>
  </nav>
</header>
<main>
  <h1>Current Affairs</h1>

  <div class="ca-calendar">
    <div class="ca-cal-header">
      <button id="ca-prev" class="cal-nav-btn">&larr;</button>
      <h2 id="ca-cal-title"></h2>
      <button id="ca-next" class="cal-nav-btn">&rarr;</button>
    </div>
    <div class="ca-cal-weekdays">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div class="ca-cal-grid" id="ca-cal-grid"></div>
    <div class="ca-cal-legend">
      <span class="legend-item"><span class="legend-dot active"></span> notes available</span>
      <span class="legend-item"><span class="legend-dot inactive"></span> no notes</span>
    </div>
  </div>

  <div id="ca-content"><p class="empty-note">Pick a highlighted date to load that day's current affairs.</p></div>
</main>
<footer>SSC CGL GS Prep &middot; Personal study reference</footer>
<script src="../assets/js/current-affairs.js"></script>
</body>
</html>
